name: flux-pysmesh-build
# =============================================================================
# pySMESH — build-only conda environment (conda-forge ONLY)
#
# Purpose: compile _core.pyd (SMESH + OCCT + Boost static, VTK dynamic).
#
# =============================================================================
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.13
  # --- THE PIN — exact match to flux's vtk ---
  - vtk=9.6.2
  # --- static-linked into _core.pyd: free to resolve ---
  - occt=8.0.0
  - libboost-devel
  # --- build toolchain ---
  - cmake>=3.27
  - ninja
  - pybind11
  - scikit-build-core
  - pip
  # --- wheel build + DLL bundling (OCCT/Boost in, VTK excluded) ---
  - delvewheel
  # --- vendoring / patching ---
  - python-patch
  - git
  # --- testing ---
  - pytest
  - hypothesis
  - numpy
  # --- typing (stubs are part of the DoD) ---
  - mypy